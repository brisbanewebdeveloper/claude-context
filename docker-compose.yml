services:
  claude-context-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
      MCP_HTTP_PATH: /mcp
      EMBEDDING_PROVIDER: Ollama
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-}
      MILVUS_ADDRESS: ${MILVUS_ADDRESS:-}
      MILVUS_TOKEN: ${MILVUS_TOKEN:-}
      CLAUDE_CONTEXT_BACKGROUND_SYNC: ${CLAUDE_CONTEXT_BACKGROUND_SYNC:-true}
      CLAUDE_CONTEXT_SYNC_INTERVAL_MS: ${CLAUDE_CONTEXT_SYNC_INTERVAL_MS:-300000}
    ports:
      - "${MCP_HTTP_PORT:-3000}:3000"
    volumes:
      - claude-context-state:/root/.context
      - ${CLAUDE_CONTEXT_WORKSPACE:-.}:/workspace:ro
    depends_on:
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  ollama-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh"]
    command: ["-c", "until ollama list; do sleep 2; done; ollama pull \"${OLLAMA_MODEL:-nomic-embed-text}\""]
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama-data:/root/.ollama
    restart: "no"

volumes:
  claude-context-state:
  ollama-data:
